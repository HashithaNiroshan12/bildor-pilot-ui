name: Publish to GitHub Packages

# Trigger: runs only when you push a git tag like v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    # Grant permission to write packages to GitHub Packages registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Point npm at GitHub Packages registry
          registry-url: "https://npm.pkg.github.com"
          # Scope tells npm: packages under @hashithaniroshan12/ go to GitHub
          scope: "@hashithaniroshan12"

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          # GitHub automatically provides this token — no setup needed
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
