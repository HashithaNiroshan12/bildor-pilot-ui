name: Publish to GitHub Packages

# Trigger: runs only when you push a git tag like v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    # Fix: use Node.js 24 runtime for GitHub Actions (suppresses deprecation warning)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Grant permission to write packages to GitHub Packages registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@hashithaniroshan12"
          # Cache npm dependencies between runs (speeds up future publishes)
          cache: "npm"

      - name: Install dependencies
        # Use npm install instead of npm ci to tolerate any lockfile drift
        run: npm install

      - name: Build library
        run: npm run build

      - name: Verify dist/ was produced
        # Fail fast with a clear message if build produced no output
        run: |
          echo "--- dist/ contents ---"
          ls -la dist/
          test -f dist/index.es.js  || (echo "ERROR: dist/index.es.js missing" && exit 1)
          test -f dist/index.cjs.js || (echo "ERROR: dist/index.cjs.js missing" && exit 1)
          test -f dist/index.d.ts   || (echo "ERROR: dist/index.d.ts missing"   && exit 1)
          echo "--- dist/ verified OK ---"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          # GitHub automatically provides this token — no manual setup needed
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
