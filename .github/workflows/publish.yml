name: Publish to GitHub Packages

# Trigger 1: automatically runs when you push a git tag like v0.1.0
# Trigger 2: manually from the GitHub Actions UI (Actions tab → Run workflow)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build and verify dist/ but skip npm publish"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  publish:
    runs-on: ubuntu-latest

    # Opt into Node.js 24 for GitHub Actions runtime now (before the June 2026 forced migration).
    # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Grant permission to write packages to GitHub Packages registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        # v5+ runs on Node 24 natively — no deprecation warning
        uses: actions/checkout@v5

      - name: Setup Node.js 20
        # v5+ runs on Node 24 natively — no deprecation warning
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@hashithaniroshan12"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build library
        run: npm run build

      - name: Verify dist/ was produced
        run: |
          echo "--- dist/ contents ---"
          ls -la dist/
          test -f dist/index.es.js  || (echo "ERROR: dist/index.es.js missing" && exit 1)
          test -f dist/index.cjs.js || (echo "ERROR: dist/index.cjs.js missing" && exit 1)
          test -f dist/index.d.ts   || (echo "ERROR: dist/index.d.ts missing"   && exit 1)
          echo "--- dist/ verified OK ---"

      - name: Publish to GitHub Packages
        # Skip publish if this is a dry run (useful for testing the build without releasing)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish
        env:
          # GitHub automatically provides this token — no manual setup needed
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry run complete
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run finished — build verified, publish skipped."
